name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: No TODO/FIXME
        run: |
          if grep -rn 'TODO\|FIXME\|HACK\|XXX\|todo!' --include='*.rs' crates/; then
            echo "::error::Found TODO/FIXME comments in source. Resolve them before merging."
            exit 1
          fi
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace --tests
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

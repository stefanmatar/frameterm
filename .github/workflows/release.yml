name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: houseabsolute/actions-rust-cross@v0
        with:
          target: ${{ matrix.target }}
          args: "--locked --release -p frameterm"

      - name: Release
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: frameterm
          target: ${{ matrix.target }}
          changes-file: ""
          extra-files: |
            README.md

  homebrew:
    name: Update Homebrew Formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Wait for release assets
        run: sleep 10

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo stefanmatar/frameterm \
            --pattern '*.sha256'

      - name: Update formula
        run: |
          V="${GITHUB_REF_NAME#v}"
          DL="https://github.com/stefanmatar/frameterm/releases/download/${GITHUB_REF_NAME}"

          SHA_MAC_ARM=$(awk '{print $1}' frameterm-macOS-arm64.tar.gz.sha256)
          SHA_MAC_X86=$(awk '{print $1}' frameterm-macOS-x86_64.tar.gz.sha256)
          SHA_LIN_X86=$(awk '{print $1}' frameterm-Linux-gnu-x86_64.tar.gz.sha256)
          SHA_LIN_ARM=$(awk '{print $1}' frameterm-Linux-gnu-arm64.tar.gz.sha256)

          cat > Formula/frameterm.rb <<RUBY
          class Frameterm < Formula
            desc "TUI automation for AI agents with video recording"
            homepage "https://github.com/stefanmatar/frameterm"
            version "${V}"
            license "MIT"

            depends_on "ffmpeg"

            on_macos do
              on_arm do
                url "${DL}/frameterm-macOS-arm64.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              end
              on_intel do
                url "${DL}/frameterm-macOS-x86_64.tar.gz"
                sha256 "${SHA_MAC_X86}"
              end
            end

            on_linux do
              on_arm do
                url "${DL}/frameterm-Linux-gnu-arm64.tar.gz"
                sha256 "${SHA_LIN_ARM}"
              end
              on_intel do
                url "${DL}/frameterm-Linux-gnu-x86_64.tar.gz"
                sha256 "${SHA_LIN_X86}"
              end
            end

            def install
              bin.install "frameterm"
            end

            test do
              assert_match "frameterm", shell_output("#{bin}/frameterm --help 2>&1", 2)
            end
          end
          RUBY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/frameterm.rb
          git diff --cached --quiet && exit 0
          git commit -m "homebrew: update formula to ${{ github.ref_name }}"
          git push origin main

      - name: Sync to homebrew-frameterm tap
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_SHA=$(gh api repos/stefanmatar/homebrew-frameterm/contents/Formula/frameterm.rb \
            --jq '.sha' 2>/dev/null || echo "")
          if [ -z "$EXISTING_SHA" ]; then
            echo "Could not read homebrew-frameterm, skipping sync"
            exit 0
          fi

          CONTENT=$(base64 -w0 Formula/frameterm.rb)

          gh api repos/stefanmatar/homebrew-frameterm/contents/Formula/frameterm.rb \
            -X PUT \
            -f message="frameterm ${{ github.ref_name }}" \
            -f content="$CONTENT" \
            -f sha="$EXISTING_SHA" \
            -f committer[name]="github-actions[bot]" \
            -f committer[email]="github-actions[bot]@users.noreply.github.com"

          echo "Synced formula to homebrew-frameterm tap"

  update-action-tag:
    name: Update Action Tag
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update floating major version tag
        run: |
          MAJOR=$(echo "${{ github.ref_name }}" | sed 's/^v//' | cut -d. -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "v${MAJOR}" -m "Update v${MAJOR} tag to ${{ github.ref_name }}"
          git push origin "v${MAJOR}" --force

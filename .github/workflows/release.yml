name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: houseabsolute/actions-rust-cross@v0
        with:
          target: ${{ matrix.target }}
          args: "--locked --release -p frameterm"

      - name: Release
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: frameterm
          target: ${{ matrix.target }}
          changes-file: ""
          extra-files: |
            README.md

  homebrew:
    name: Update Homebrew Tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo stefanmatar/frameterm \
            --pattern '*.sha256'

      - name: Push formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          V="${GITHUB_REF_NAME#v}"
          DL="https://github.com/stefanmatar/frameterm/releases/download/${GITHUB_REF_NAME}"

          SHA_DAR_ARM=$(awk '{print $1}' frameterm-aarch64-apple-darwin.sha256)
          SHA_DAR_X86=$(awk '{print $1}' frameterm-x86_64-apple-darwin.sha256)
          SHA_LIN_X86=$(awk '{print $1}' frameterm-x86_64-unknown-linux-gnu.sha256)
          SHA_LIN_ARM=$(awk '{print $1}' frameterm-aarch64-unknown-linux-gnu.sha256)

          FORMULA=$(cat <<RUBY
          class Frameterm < Formula
            desc "TUI automation for AI agents with video recording"
            homepage "https://github.com/stefanmatar/frameterm"
            version "${V}"
            license "MIT"

            depends_on "ffmpeg"

            on_macos do
              on_arm do
                url "${DL}/frameterm-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DAR_ARM}"
              end
              on_intel do
                url "${DL}/frameterm-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DAR_X86}"
              end
            end

            on_linux do
              on_arm do
                url "${DL}/frameterm-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LIN_ARM}"
              end
              on_intel do
                url "${DL}/frameterm-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LIN_X86}"
              end
            end

            def install
              bin.install "frameterm"
            end

            test do
              assert_match "frameterm", shell_output("#{bin}/frameterm --help 2>&1", 2)
            end
          end
          RUBY
          )

          # Get existing file SHA if it exists
          EXISTING_SHA=$(gh api repos/stefanmatar/homebrew-tap/contents/Formula/frameterm.rb \
            --jq '.sha' 2>/dev/null || echo "")

          SHA_PARAM=""
          if [ -n "$EXISTING_SHA" ]; then
            SHA_PARAM=",\"sha\":\"${EXISTING_SHA}\""
          fi

          # Update formula via GitHub Contents API
          echo "${FORMULA}" | python3 -c "
          import sys, base64, json
          content = sys.stdin.read()
          print(json.dumps({
            'message': 'frameterm ${{ github.ref_name }}',
            'content': base64.b64encode(content.encode()).decode(),
            'committer': {
              'name': 'github-actions[bot]',
              'email': 'github-actions[bot]@users.noreply.github.com'
            }
          }))" > /tmp/body.json

          if [ -n "$EXISTING_SHA" ]; then
            python3 -c "
          import json
          d = json.load(open('/tmp/body.json'))
          d['sha'] = '${EXISTING_SHA}'
          json.dump(d, open('/tmp/body.json','w'))
          "
          fi

          gh api repos/stefanmatar/homebrew-tap/contents/Formula/frameterm.rb \
            -X PUT \
            --input /tmp/body.json

          echo "Updated homebrew formula to ${V}"
